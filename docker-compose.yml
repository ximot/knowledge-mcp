# All-in-One deployment: knowledge-mcp + Qdrant + Ollama
# Quick start: docker compose up -d
# Compatible with Docker and Podman (podman-compose)

services:
  knowledge-mcp:
    build: .
    container_name: knowledge-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8765}:8765"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - VECTOR_SIZE=${VECTOR_SIZE:-768}
      - MCP_PORT=8765
      - MCP_HOST=0.0.0.0
    depends_on:
      qdrant:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    networks:
      - knowledge-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - knowledge-net
    healthcheck:
      # Qdrant image has bash but no curl/wget — use /dev/tcp
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - knowledge-net
    healthcheck:
      # Ollama image only has the ollama binary — no curl/wget
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Init container: pulls the embedding model on first start
  ollama-init:
    image: docker.io/ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - knowledge-net
    restart: "no"

networks:
  knowledge-net:
    driver: bridge

volumes:
  qdrant_data:
    driver: local
  ollama_models:
    driver: local
